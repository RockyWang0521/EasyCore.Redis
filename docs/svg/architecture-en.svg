<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="980" height="460" rx="16" fill="url(#bg)"/>
  <text x="40" y="42" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="20" font-weight="700">EasyCore.Redis Architecture</text>
  <text x="40" y="66" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="13">Host App ’ DI ’ Shared Connection ’ Cache / Tx / Lock / Service Cache ’ Redis</text>

  <rect x="40" y="100" width="150" height="100" rx="12" fill="#243044" stroke="#3d9cf0" stroke-width="2" filter="url(#shadow)"/>
  <text x="115" y="140" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="14" font-weight="700">ASP.NET Core</text>
  <text x="115" y="162" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">Host / Demo</text>
  <text x="115" y="182" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">EasyCoreRedis()</text>

  <rect x="230" y="95" width="200" height="110" rx="12" fill="#243044" stroke="#3ecf8e" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="130" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="14" font-weight="700">EasyCore.Redis</text>
  <text x="330" y="152" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">Meta Package</text>
  <text x="330" y="172" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">Registers all features</text>
  <text x="330" y="192" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">v8.0.0</text>

  <rect x="470" y="70" width="180" height="70" rx="12" fill="#243044" stroke="#f0b429" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="98" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">.Distributed</text>
  <text x="560" y="120" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">IDistributedCache</text>

  <rect x="470" y="155" width="180" height="70" rx="12" fill="#243044" stroke="#f0b429" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="183" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">.Locking</text>
  <text x="560" y="205" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">IDistributedLock</text>

  <rect x="470" y="240" width="180" height="70" rx="12" fill="#243044" stroke="#f0b429" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="268" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">.Service</text>
  <text x="560" y="290" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">[ServerCache] AOP</text>

  <rect x="700" y="100" width="240" height="180" rx="12" fill="#243044" stroke="#dc382c" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="145" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="16" font-weight="700">Redis</text>
  <text x="820" y="175" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">StackExchange.Redis</text>
  <text x="820" y="200" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">ConnectionMultiplexer</text>
  <text x="820" y="225" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">Shared IRedisConnection</text>
  <text x="820" y="250" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">Key = DistributedName:key</text>

  <path d="M190 150 H230" stroke="#3d9cf0" stroke-width="2"/>
  <path d="M430 150 H470" stroke="#3ecf8e" stroke-width="2"/>
  <path d="M650 105 H700" stroke="#f0b429" stroke-width="2"/>
  <path d="M650 190 H700" stroke="#f0b429" stroke-width="2"/>
  <path d="M650 275 H720" stroke="#f0b429" stroke-width="2"/>
  <path d="M560 310 V340 H820 V280" stroke="#dc382c" stroke-width="2" fill="none"/>

  <text x="40" y="360" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="13">Five Redis data types (IDistributedCache)</text>
  <rect x="40" y="375" width="160" height="50" rx="10" fill="#1a2332" stroke="#2f3f55"/>
  <text x="120" y="405" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13">String</text>
  <rect x="220" y="375" width="160" height="50" rx="10" fill="#1a2332" stroke="#2f3f55"/>
  <text x="300" y="405" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13">Hash</text>
  <rect x="400" y="375" width="160" height="50" rx="10" fill="#1a2332" stroke="#2f3f55"/>
  <text x="480" y="405" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13">List</text>
  <rect x="580" y="375" width="160" height="50" rx="10" fill="#1a2332" stroke="#2f3f55"/>
  <text x="660" y="405" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13">Set</text>
  <rect x="760" y="375" width="180" height="50" rx="10" fill="#1a2332" stroke="#2f3f55"/>
  <text x="850" y="405" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13">SortedSet</text>
</svg>
